name: Release

# Triggered by the `vX.Y.Z` tags that the Changesets workflow pushes after a
# "Version Packages" PR is merged. npm publish itself is owned by Changesets
# (see .github/workflows/changesets.yml); this workflow handles everything
# else that should accompany a release: Go module announcement, and PyPI
# publish once the runfile-ai PyPI org is set up.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  # `id-token: write` is required for PyPI trusted publishing (OIDC).
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # The PyPI trusted publisher you configured on pypi.org should target this
    # environment name. (You can rename it; just match it on PyPI.)
    environment:
      name: release
      url: https://pypi.org/project/runfile-ai-schemas/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ----- PyPI publish (DISABLED until GA) ----------------------------
      # The runfile-ai PyPI organisation isn't ready yet, so we skip the
      # Python wheel publish. Re-enable when the org + trusted publisher are
      # configured at pypi.org/manage/account/publishing/.
      # - name: Install PyPI build tooling
      #   run: pip install 'datamodel-code-generator[http]>=0.40,<1.0' build
      # - name: Build PyPI wheel + sdist
      #   run: python -m build generated/python
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: generated/python/dist
      #     # Trusted publishing — PyPI verifies the GitHub OIDC token against the
      #     # publisher configured at pypi.org/manage/account/publishing/.
      #     # No `password:` field on purpose.

      # ----- Go: nothing to publish, just announce -----------------------
      # Go consumers fetch by Git tag. The push that triggered this workflow
      # already created the tag, so `go get github.com/runfile-ai/schemas@vX.Y.Z`
      # works as soon as this job completes.
      - name: Announce Go module
        run: |
          echo "Go consumers can now run:"
          echo "  go get github.com/runfile-ai/schemas@${GITHUB_REF_NAME}"
